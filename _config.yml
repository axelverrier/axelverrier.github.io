plugins:
  - jekyll-seo-tag
# Site settings
title: "Axel Verrier Resume"

# Build settings
markdown: kramdown
sass:
  sass_dir: _sass
  style: compressed

collections:
  - resumefr
  - resumeen
# Resume settings
avatar:                  "true"
name:                    "Axel Verrier"

descriptionfr:          "Etudiant en économie"
descriptionen:          "Undergraduate student in economics"

contact_info_fr:        "Université de Bordeaux • axel.verrier@proton.me"
contact_info_en:        "University of Bordeaux • axel.verrier@proton.me"
